<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Image Gallery</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Image Gallery</h1>

<div class="buttons">
    <button onclick="filterImages('all')">All</button>
    <button onclick="filterImages('nature')">Nature</button>
    <button onclick="filterImages('animals')">Animals</button>
    <button onclick="filterImages('city')">City</button>
</div>

<div class="gallery">

    <div class="image nature">
        <img src="images/nature1.jpg" onclick="openLightbox(0)">
    </div>

    <div class="image nature">
        <img src="images/nature2.jpg" onclick="openLightbox(1)">
    </div>

    <div class="image animals">
        <img src="images/animal1.jpg" onclick="openLightbox(2)">
    </div>

    <div class="image animals">
        <img src="images/animal2.jpg" onclick="openLightbox(3)">
    </div>

    <div class="image city">
        <img src="images/city1.jpg" onclick="openLightbox(4)">
    </div>

    <div class="image city">
        <img src="images/city2.jpg" onclick="openLightbox(5)">
    </div>

</div>

<div id="lightbox">

    <span class="close" onclick="closeLightbox()">×</span>

    <button class="prev" onclick="changeImage(-1)">❮</button>

    <img id="lightboxImage">

    <button class="next" onclick="changeImage(1)">❯</button>

</div>

<script src="script.js"></script>

</body>
</html>
